name: Build and Deploy to EKS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hell-cli
  EKS_CLUSTER: hell-cli-cluster

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t hell-cli .

    - name: Tag Image
      run: |
        docker tag hell-cli:latest \
        340257301941.dkr.ecr.us-east-1.amazonaws.com/hell-cli:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        340257301941.dkr.ecr.us-east-1.amazonaws.com/hell-cli:${{ github.sha }}

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region us-east-1 \
        --name hell-cli-cluster

    - name: Update Deployment Image
      run: |
        kubectl set image deployment/hell-cli \
        hell-cli=340257301941.dkr.ecr.us-east-1.amazonaws.com/hell-cli:${{ github.sha }} \
        --record || true

    - name: Apply Kubernetes Manifests
      run: |
        kubectl apply -f k8s/service.yaml
